repos:
  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.30.1
    hooks:
      - id: gitleaks

  - repo: local
    hooks:
      - id: osv-scanner
        name: osv-scanner (依存関係 脆弱性スキャン)
        entry: osv-scanner -r .
        language: system
        pass_filenames: false
        files: ^(.*package-lock\.json|.*Cargo\.lock|.*requirements.*\.txt|.*poetry\.lock|.*pnpm-lock\.yaml|.*yarn\.lock|.*composer\.lock|.*Pipfile\.lock|.*go\.sum|.*Gemfile\.lock|.*uv\.lock|.*pylock\.toml|.*pdm\.lock|.*bun\.lock)$
